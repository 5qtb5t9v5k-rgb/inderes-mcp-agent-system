name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer push lands on the same branch / PR.
# Saves Actions minutes and keeps logs tidy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install --quiet ruff==0.15.12
      - name: ruff check
        run: ruff check src/ ui/ tests/
      # NOTE: `ruff format --check` deliberately not gated yet — running it now
      # would reformat 33 files, producing a noisy mass commit. Plan in BACKLOG:
      # one cleanup commit (formatting only), then enable the format gate here.

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
      - name: Cache uv venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install deps (dev + ui extras)
        run: uv sync --extra dev --extra ui
      - name: Run pytest
        env:
          # Some modules read GEMINI_API_KEY at import time; tests don't make
          # real API calls but a non-empty value is required to avoid early-exit.
          GEMINI_API_KEY: dummy-for-tests
        run: uv run pytest -q
