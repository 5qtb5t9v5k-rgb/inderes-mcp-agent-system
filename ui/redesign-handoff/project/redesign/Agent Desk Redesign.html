<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1400">
<title>Inderes Agent Desk — Redesign Exploration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    /* Refined terminal palette — slightly warmer than pure black */
    --bg-0: #0a0b0d;          /* canvas/page */
    --bg-1: #101216;          /* card */
    --bg-2: #161a20;          /* nested card */
    --bg-3: #1d2229;          /* hover */
    --line: #232831;
    --line-2: #2f3640;
    --ink-0: #e6e8eb;         /* primary text */
    --ink-1: #b6bcc6;         /* body */
    --ink-2: #7a828d;         /* muted */
    --ink-3: #4d5460;         /* very muted */

    /* Persona colors — refined for AA contrast on bg-1 */
    --p-lead:      #f5b942;   /* amber  ◆ */
    --p-quant:     #5fd28a;   /* green  ▲ */
    --p-research:  #6aa9ff;   /* blue   ■ */
    --p-sentiment: #ff7eb3;   /* pink   ● */
    --p-portfolio: #c294ff;   /* violet ✦ */

    /* Semantic */
    --ok:    #5fd28a;
    --warn:  #f5b942;
    --err:   #ff6b6b;
    --link:  #7eb8ff;

    --radius: 4px;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--ink-0);font-family:var(--mono);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

  /* ─────────────────────────  ARTBOARD SCAFFOLD  ───────────────────────── */
  .ad{
    width:100%; height:100%;
    background:var(--bg-0);
    color:var(--ink-0);
    font-family:var(--mono);
    font-size:13px;
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  /* Top chrome (browser-like minimal) */
  .ad__topbar{
    height:36px; flex:0 0 36px;
    display:flex; align-items:center; gap:12px;
    padding:0 16px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0d0f12,#0a0b0d);
    font-size:11px; color:var(--ink-2);
    letter-spacing:.04em;
  }
  .ad__brand{
    color:var(--ink-0); font-weight:600; letter-spacing:.08em;
  }
  .ad__brand .slash{color:var(--p-lead)}
  .ad__topbar .sep{color:var(--ink-3)}
  .ad__status{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--ink-2)}
  .ad__status .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}

  /* Body grid */
  .ad__body{
    flex:1; display:grid;
    grid-template-columns: 240px 1fr;
    min-height:0;
  }
  .ad__body--withpanel{
    grid-template-columns: 240px 1fr 380px;
  }

  /* Sidebar */
  .side{
    border-right:1px solid var(--line);
    background:var(--bg-0);
    padding:16px 14px;
    display:flex; flex-direction:column; gap:18px;
    overflow:hidden;
  }
  .side__sec h3{
    font-size:10px; letter-spacing:.18em; color:var(--ink-3);
    margin:0 0 8px; font-weight:600;
  }
  .side__row{
    display:flex; gap:8px; align-items:flex-start;
    padding:6px 6px; border-radius:var(--radius);
    font-size:12px; color:var(--ink-1);
    cursor:default;
  }
  .side__row:hover{background:var(--bg-2)}
  .side__row .glyph{font-size:11px; width:14px; flex:0 0 14px; text-align:center; padding-top:1px}
  .side__row .nm{display:flex;flex-direction:column;gap:1px}
  .side__row .nm b{color:var(--ink-0); font-weight:600; letter-spacing:.04em; font-size:11px}
  .side__row .nm span{color:var(--ink-2); font-size:11px; line-height:1.3}
  .side__row.is-dim{opacity:.32}
  .side__row.is-active{background:rgba(245,185,66,.06)}
  .side__row.is-active .nm b{color:var(--p-lead)}

  .side__run{
    display:flex; gap:8px; padding:6px 6px; border-radius:var(--radius);
    color:var(--ink-2); font-size:11px; cursor:pointer;
  }
  .side__run:hover{background:var(--bg-2); color:var(--ink-1)}
  .side__run .ts{color:var(--ink-3); flex:0 0 56px; font-variant-numeric:tabular-nums}
  .side__run .glyphs{flex:0 0 36px; letter-spacing:1px}
  .side__run .q{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  .side__disc{
    border:1px solid rgba(255,107,107,.3);
    background:rgba(255,107,107,.04);
    padding:8px 10px; border-radius:var(--radius);
    font-size:10.5px; color:#d8a8a8; line-height:1.4;
  }
  .side__disc b{color:#ffb0b0; letter-spacing:.12em; font-size:10px; display:block; margin-bottom:2px}

  /* Main column */
  .main{
    display:flex; flex-direction:column;
    min-width:0; min-height:0;
    overflow:hidden;
  }
  .main__scroll{
    flex:1; overflow:auto;
    padding:24px 32px;
    display:flex; flex-direction:column; gap:18px;
  }

  /* Headline / hero */
  .hero{
    border-left:2px solid var(--p-lead);
    padding:8px 0 8px 14px;
    margin-bottom:4px;
  }
  .hero__eyebrow{font-size:10px; letter-spacing:.22em; color:var(--p-lead); font-weight:600}
  .hero__h1{font-size:22px; letter-spacing:.04em; margin:6px 0 4px; font-weight:600}
  .hero__h1 .plus{color:var(--ink-3); margin:0 6px}
  .hero__h1 .eq{color:var(--ink-3); margin:0 6px}
  .hero__h1 .res{color:var(--p-lead)}
  .hero__sub{color:var(--ink-2); font-size:12px}

  /* Persona glyph row */
  .glyph-row{display:flex; gap:18px; margin-top:10px; font-size:11px; letter-spacing:.06em}
  .glyph-row .gg{display:flex;align-items:center;gap:6px}
  .glyph-row .gg.is-dim{opacity:.28}
  .gg .lead{color:var(--p-lead)} .gg .quant{color:var(--p-quant)} .gg .research{color:var(--p-research)} .gg .sentiment{color:var(--p-sentiment)} .gg .portfolio{color:var(--p-portfolio)}

  /* Meta strip under hero */
  .meta-strip{
    display:flex; gap:14px; align-items:center;
    font-size:11px; color:var(--ink-2);
    padding:6px 0; border-bottom:1px dashed var(--line);
  }
  .meta-strip .mc{color:var(--ok)} .meta-strip b{color:var(--ink-0); font-weight:500}

  /* Query bubble */
  .qbox{
    border:1px solid var(--line);
    background:var(--bg-1);
    border-radius:var(--radius);
    padding:14px 16px;
    display:flex; gap:12px;
  }
  .qbox .who{
    width:22px; height:22px; flex:0 0 22px;
    background:var(--bg-3); color:var(--ink-1);
    display:grid; place-items:center;
    border-radius:50%;
    font-size:10px; letter-spacing:.04em;
  }
  .qbox .text{font-size:13.5px; color:var(--ink-0); line-height:1.55}

  /* Chat input */
  .input{
    border:1px solid var(--line);
    background:var(--bg-1);
    border-radius:var(--radius);
    padding:12px 14px;
    display:flex; align-items:center; gap:10px;
    color:var(--ink-2);
    margin-top:auto;
  }
  .input .prompt{color:var(--p-lead)}
  .input .ph{flex:1; color:var(--ink-3)}
  .input .send{
    width:24px; height:24px; border-radius:var(--radius);
    background:var(--p-lead); color:#0a0b0d;
    display:grid; place-items:center; font-weight:700;
  }

  /* Live status block */
  .live{
    border:1px solid var(--line);
    border-left:2px solid var(--p-lead);
    background:var(--bg-1);
    border-radius:var(--radius);
    padding:14px 16px;
    font-size:12px;
    display:flex; flex-direction:column; gap:6px;
  }
  .live__head{display:flex; align-items:center; gap:8px; color:var(--ink-2); font-size:11px; letter-spacing:.06em; padding-bottom:6px; border-bottom:1px dashed var(--line)}
  .live__head .pulse{width:6px;height:6px;border-radius:50%;background:var(--p-lead);box-shadow:0 0 8px var(--p-lead)}
  .live__head b{color:var(--ink-0); font-weight:500; letter-spacing:.06em}
  .live__head .timer{margin-left:auto; color:var(--ink-2); font-variant-numeric:tabular-nums}
  .live__line{display:flex; gap:8px; padding:2px 0; color:var(--ink-1); align-items:baseline}
  .live__line .ic{flex:0 0 16px; color:var(--ink-2)}
  .live__line .body{flex:1}
  .live__line .body em{font-style:normal; color:var(--ink-0)}
  .live__line .ts{color:var(--ink-3); font-size:10.5px; font-variant-numeric:tabular-nums}
  .live__line.is-done .ic{color:var(--ok)}
  .live__line.is-running{color:var(--ink-0)}
  .live__line.is-running .ic{color:var(--p-lead)}
  .live__line.is-pending{color:var(--ink-3)}
  .live__line.is-pending .ic{color:var(--ink-3)}

  .pill{display:inline-flex; align-items:center; gap:5px; padding:1px 6px; border-radius:3px; font-size:10.5px; letter-spacing:.06em; background:var(--bg-2); color:var(--ink-1); border:1px solid var(--line)}
  .pill .g{font-size:10px}
  .pill.lead{color:var(--p-lead)} .pill.quant{color:var(--p-quant)} .pill.research{color:var(--p-research)} .pill.sentiment{color:var(--p-sentiment)} .pill.portfolio{color:var(--p-portfolio)}

  /* Result — collapsed timeline strip */
  .timeline{
    display:flex; align-items:center; gap:12px;
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--bg-1);
    padding:8px 14px; font-size:11px; color:var(--ink-2);
    cursor:pointer;
  }
  .timeline:hover{border-color:var(--line-2)}
  .timeline .lab{color:var(--ink-3); letter-spacing:.12em; font-size:10px}
  .timeline .v{color:var(--ink-0); font-variant-numeric:tabular-nums}
  .timeline .ag{display:flex; gap:6px}
  .timeline .ag span{font-size:10px}
  .timeline .open{margin-left:auto; color:var(--ink-3)}

  /* Reasoning (Perustelut) callout */
  .reasoning{
    border:1px solid var(--line);
    border-left:2px solid var(--p-lead);
    background:linear-gradient(180deg, rgba(245,185,66,.04), rgba(245,185,66,0));
    border-radius:var(--radius);
    padding:12px 16px;
    color:var(--ink-1);
    font-style:italic;
    font-size:12.5px; line-height:1.6;
  }
  .reasoning b{color:var(--p-lead); font-style:normal; font-weight:600; letter-spacing:.08em; font-size:11px; display:inline-block; margin-right:6px}

  /* Päättely — A: prose */
  .paattely-a{
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--bg-1);
    padding:12px 16px;
    font-size:12.5px; color:var(--ink-1); font-style:italic; line-height:1.6;
  }
  .paattely-a__head{
    display:flex; align-items:center; gap:8px;
    color:var(--ink-2); font-style:normal; font-size:11px; letter-spacing:.08em;
    margin-bottom:8px; cursor:pointer;
  }
  .paattely-a__head .chev{font-size:10px; color:var(--ink-3)}
  .paattely-a__head b{color:var(--ink-0); font-weight:500}

  /* Päättely — B: structured slots */
  .paattely-b{
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--bg-1);
    padding:0;
    overflow:hidden;
  }
  .paattely-b__head{
    display:flex; align-items:center; gap:8px;
    padding:10px 16px;
    border-bottom:1px solid var(--line);
    color:var(--ink-2); font-size:11px; letter-spacing:.08em;
  }
  .paattely-b__head b{color:var(--ink-0); font-weight:500}
  .paattely-b__head .meta{margin-left:auto; color:var(--ink-3); font-size:10.5px}
  .paattely-b__grid{
    display:grid; grid-template-columns:1fr 1fr; gap:0;
  }
  .slot{
    padding:12px 16px;
    border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);
    font-size:12px;
  }
  .slot:nth-child(2n){border-right:0}
  .slot:nth-last-child(-n+2){border-bottom:0}
  .slot__lab{
    display:flex; align-items:center; gap:6px;
    font-size:10px; letter-spacing:.16em; color:var(--ink-3);
    font-weight:600; margin-bottom:6px;
  }
  .slot__lab .icn{font-size:10px}
  .slot.disagree .slot__lab{color:#ff9f9f}
  .slot.resolution .slot__lab{color:var(--p-lead)}
  .slot.uncertain .slot__lab{color:var(--p-research)}
  .slot.skipped .slot__lab{color:var(--ink-2)}
  .slot__body{color:var(--ink-1); line-height:1.55}
  .slot__body code{
    background:var(--bg-2); padding:1px 5px; border-radius:2px;
    color:var(--ink-0); font-size:11.5px;
  }

  /* Synthesis answer body */
  .answer h2{
    font-family:var(--mono); font-size:14px; letter-spacing:.06em;
    color:var(--p-lead); font-weight:600;
    margin:18px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--line);
  }
  .answer h2:first-child{margin-top:0}
  .answer p{margin:0 0 10px; color:var(--ink-1); line-height:1.65; font-size:13px}
  .answer ul{margin:0 0 10px; padding-left:20px; color:var(--ink-1)}
  .answer li{margin-bottom:5px; line-height:1.6}
  .answer li b{color:var(--p-lead); font-weight:600}
  .answer strong{color:var(--ink-0)}

  /* Inline provenance footnote */
  .fn{
    display:inline-block; vertical-align:super;
    font-size:9.5px; padding:0 4px; height:14px; line-height:14px;
    border-radius:2px; margin:0 2px;
    background:var(--bg-3); color:var(--ink-1);
    border:1px solid var(--line);
    cursor:pointer; text-decoration:none;
  }
  .fn.q{color:var(--p-quant); border-color:rgba(95,210,138,.3)}
  .fn.r{color:var(--p-research); border-color:rgba(106,169,255,.3)}
  .fn.s{color:var(--p-sentiment); border-color:rgba(255,126,179,.3)}
  .fn.p{color:var(--p-portfolio); border-color:rgba(194,148,255,.3)}

  /* Conflict callout */
  .conflict{
    border:1px solid rgba(255,107,107,.3);
    background:rgba(255,107,107,.04);
    border-radius:var(--radius);
    padding:12px 16px;
    font-size:12.5px;
  }
  .conflict__head{
    display:flex; align-items:center; gap:8px;
    color:#ff9f9f; font-size:11px; letter-spacing:.1em; font-weight:600;
    margin-bottom:8px;
  }
  .conflict__row{display:flex; gap:10px; padding:5px 0; align-items:flex-start; color:var(--ink-1)}
  .conflict__row .who{flex:0 0 100px}

  /* Sources */
  .sources{
    border-top:1px dashed var(--line);
    padding-top:14px; margin-top:6px;
  }
  .sources__head{
    font-size:10px; letter-spacing:.18em; color:var(--ink-3);
    margin-bottom:8px; font-weight:600;
  }
  .src{
    display:flex; gap:10px; padding:6px 0; align-items:baseline;
    font-size:12px; color:var(--ink-1);
    border-bottom:1px solid var(--line);
  }
  .src:last-child{border-bottom:0}
  .src .num{color:var(--ink-3); flex:0 0 22px; font-variant-numeric:tabular-nums}
  .src a{color:var(--link); text-decoration:none}
  .src a:hover{text-decoration:underline}
  .src .date{color:var(--ink-3); margin-left:auto; font-size:11px}

  /* Follow-ups */
  .followups{display:flex; gap:8px; flex-wrap:wrap}
  .followups .chip{
    padding:8px 12px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--bg-1); color:var(--ink-1);
    font-size:11.5px; cursor:pointer; line-height:1.4;
    max-width:280px;
  }
  .followups .chip:hover{border-color:var(--p-lead); color:var(--ink-0)}
  .followups .chip .q{color:var(--ink-3); margin-right:6px}

  /* ─────────────────────────  ACTIVITY PANEL (side)  ───────────────────── */
  .panel{
    border-left:1px solid var(--line);
    background:#0c0e11;
    display:flex; flex-direction:column;
    min-height:0;
  }
  .panel__head{
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px;
    font-size:11px; letter-spacing:.12em; color:var(--ink-2);
  }
  .panel__head b{color:var(--ink-0); letter-spacing:.08em; font-weight:600}
  .panel__head .x{margin-left:auto; color:var(--ink-3); cursor:pointer}
  .panel__tabs{
    display:flex; border-bottom:1px solid var(--line);
    font-size:11px;
  }
  .panel__tabs .tab{
    padding:8px 14px; color:var(--ink-2); cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .panel__tabs .tab.is-active{color:var(--ink-0); border-bottom-color:var(--p-lead)}
  .panel__tabs .tab .n{color:var(--ink-3); margin-left:5px}
  .panel__body{flex:1; overflow:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px}

  /* Metric cards */
  .metrics{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .metric{
    border:1px solid var(--line); border-radius:var(--radius);
    padding:10px 12px; background:var(--bg-1);
  }
  .metric .lab{font-size:10px; letter-spacing:.12em; color:var(--ink-3); margin-bottom:4px}
  .metric .v{font-size:18px; color:var(--ink-0); font-weight:600; font-variant-numeric:tabular-nums}
  .metric .v.ok{color:var(--ok)}
  .metric .sub{font-size:10.5px; color:var(--ink-2); margin-top:2px}

  /* Stage timeline (gantt-ish) */
  .stages{font-size:11px}
  .stage{display:flex; align-items:center; gap:8px; padding:4px 0; color:var(--ink-1)}
  .stage .nm{flex:0 0 90px; color:var(--ink-2); font-size:10.5px; letter-spacing:.06em}
  .stage .bar{flex:1; height:6px; border-radius:3px; background:var(--bg-2); position:relative; overflow:hidden}
  .stage .bar > i{position:absolute; top:0; bottom:0; border-radius:3px}
  .stage .v{flex:0 0 50px; text-align:right; color:var(--ink-2); font-variant-numeric:tabular-nums; font-size:10.5px}

  /* Subagent log items */
  .agcard{
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--bg-1);
    overflow:hidden;
  }
  .agcard__head{
    display:flex; align-items:center; gap:8px;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
  }
  .agcard__head .glyph{font-size:13px; width:18px; flex:0 0 18px; text-align:center}
  .agcard__head .nm{font-weight:600; letter-spacing:.06em; font-size:11px}
  .agcard__head .role{color:var(--ink-3); font-size:10.5px; margin-left:4px}
  .agcard__head .meta{margin-left:auto; color:var(--ink-2); font-size:10.5px; display:flex; gap:8px}
  .agcard__head .meta .ok{color:var(--ok)}
  .agcard__body{padding:10px 12px; font-size:11.5px; color:var(--ink-1); line-height:1.55}
  .agcard__body .think{color:var(--ink-2); font-style:italic; margin-bottom:6px}
  .agcard__tools{
    border-top:1px dashed var(--line);
    padding:6px 12px; font-size:10.5px;
  }
  .agcard__tools .toolhead{
    color:var(--ink-3); letter-spacing:.1em; font-size:10px;
    cursor:pointer; padding:4px 0; display:flex; gap:6px; align-items:center;
  }
  .agcard__tools .toolhead .n{color:var(--ink-1)}
  .agcard__tools ol{margin:4px 0 4px 18px; padding:0; color:var(--ink-2)}
  .agcard__tools li{padding:3px 0}
  .agcard__tools .tool{color:var(--p-quant); font-weight:500}
  .agcard__tools .args{color:var(--ink-3); font-size:10.5px}
  .agcard__tools .ret{color:var(--ink-2); font-size:10.5px}

  /* glyphs as colored blocks for persona left bar */
  .agcard.lead{border-left:2px solid var(--p-lead)}
  .agcard.quant{border-left:2px solid var(--p-quant)}
  .agcard.research{border-left:2px solid var(--p-research)}
  .agcard.sentiment{border-left:2px solid var(--p-sentiment)}
  .agcard.portfolio{border-left:2px solid var(--p-portfolio)}

  /* Inline log (small) when used at bottom of main */
  .inline-log{
    border:1px solid var(--line); border-radius:var(--radius);
    background:var(--bg-1);
    overflow:hidden;
  }
  .inline-log__head{
    padding:10px 14px;
    display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--line);
    font-size:11px; color:var(--ink-2); letter-spacing:.08em; cursor:pointer;
  }
  .inline-log__head b{color:var(--ink-0); font-weight:500}
  .inline-log__head .chev{color:var(--ink-3); margin-left:auto}
  .inline-log__lay{
    display:grid; grid-template-columns: 200px 1fr; gap:0;
  }
  .inline-log__nav{
    border-right:1px solid var(--line);
    padding:10px 0;
    display:flex; flex-direction:column;
  }
  .inline-log__nav .ent{
    display:flex; align-items:center; gap:8px;
    padding:7px 14px; font-size:11px; color:var(--ink-1); cursor:pointer;
    border-left:2px solid transparent;
  }
  .inline-log__nav .ent:hover{background:var(--bg-2)}
  .inline-log__nav .ent.is-active{background:var(--bg-2); border-left-color:var(--p-lead); color:var(--ink-0)}
  .inline-log__nav .ent .glyph{width:14px}
  .inline-log__nav .ent .ms{margin-left:auto; color:var(--ink-3); font-size:10px; font-variant-numeric:tabular-nums}
  .inline-log__detail{padding:14px 18px; min-height:280px}

  /* ─────────────────────────  ARTBOARD HEADER (canvas chrome)  ───────────── */
  /* DCArtboard handles its own label; we do not need internal header */

  /* helpers */
  .row{display:flex; gap:8px; align-items:center}
  .gap8{gap:8px} .gap12{gap:12px}
  .muted{color:var(--ink-2)}
  .num{font-variant-numeric:tabular-nums}
  .mono{font-family:var(--mono)}

  /* small annotation bubble that sits inside artboard for design rationale */
  .anno{
    position:absolute; top:10px; right:10px;
    background:rgba(245,185,66,.08);
    border:1px dashed rgba(245,185,66,.4);
    color:#f5b942; padding:4px 8px; border-radius:3px;
    font-size:10px; letter-spacing:.08em; z-index:5;
  }
  .ad{position:relative}
</style>
